<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDEX - Premium Study Assistant</title>
    <!-- [All original head content remains the same] -->
    <style>
        /* [All original CSS remains the same] */
        
        /* ===== NEW: Week Navigation Styles ===== */
        .week-nav-btn {
            background: rgba(255, 115, 0, 0.15);
            border: 1px solid rgba(255, 115, 0, 0.3);
            color: var(--accent-orange);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .week-nav-btn:hover {
            background: rgba(255, 115, 0, 0.3);
            transform: scale(1.1);
        }
        .week-current-btn {
            background: rgba(0, 210, 106, 0.1);
            border: 1px solid rgba(0, 210, 106, 0.3);
            color: var(--success);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .week-current-btn:hover {
            background: rgba(0, 210, 106, 0.25);
            transform: scale(1.1);
        }
        .week-header-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 16px 20px;
            background: linear-gradient(135deg, rgba(255,115,0,0.08), rgba(130,0,255,0.05));
            border-radius: 16px;
            border: 1px solid rgba(255,115,0,0.15);
        }
        .week-info-center {
            text-align: center;
            flex: 1;
        }
        .week-number-display {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .week-number-display .current-badge {
            font-size: 11px;
            background: var(--accent-orange);
            color: #000;
            padding: 2px 8px;
            border-radius: 8px;
            margin-inline-start: 8px;
        }
        .week-range-display {
            font-size: 12px;
            color: var(--text-gray);
            font-weight: 600;
        }
        .week-archive-badge {
            font-size: 10px;
            color: var(--success);
            background: rgba(0,210,106,0.1);
            padding: 2px 8px;
            border-radius: 6px;
            margin-top: 4px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- [All original body HTML remains the same until the script section] -->
    
    <script>
        // [Original Firebase and auth code remains the same]
        
        // ===== WEEK NAVIGATION STATE =====
        let currentViewedWeekOffset = 0; // 0 = current week, -1 = last week, 1 = next week
        let archivedWeeks = {}; // Store archived week data
        
        // ===== WEEK NAVIGATION FUNCTIONS =====
        function getWeekStartDate(offset = 0) {
            const now = new Date();
            const dayOfWeek = now.getDay(); // 0=Sun, 6=Sat
            const daysToSaturday = dayOfWeek === 6 ? 0 : dayOfWeek + 1;
            const saturday = new Date(now);
            saturday.setDate(now.getDate() - daysToSaturday);
            saturday.setHours(0, 0, 0, 0);
            saturday.setDate(saturday.getDate() + (offset * 7));
            return saturday;
        }

        function getWeekEndDate(weekStart) {
            const end = new Date(weekStart);
            end.setDate(end.getDate() + 6); // Friday
            end.setHours(23, 59, 59, 999);
            return end;
        }

        function getWeekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function formatWeekRange(weekStart) {
            const weekEnd = getWeekEndDate(weekStart);
            const opts = { month: 'short', day: 'numeric' };
            const startStr = weekStart.toLocaleDateString(currentSystemLanguage === 'ar' ? 'ar-EG' : 'en-US', opts);
            const endStr = weekEnd.toLocaleDateString(currentSystemLanguage === 'ar' ? 'ar-EG' : 'en-US', opts);
            return `${startStr} - ${endStr}`;
        }

        function navigateWeek(direction) {
            currentViewedWeekOffset += direction;
            renderWeeklySegmentedChart();
        }

        function goToCurrentWeek() {
            currentViewedWeekOffset = 0;
            renderWeeklySegmentedChart();
        }

        // ===== WEEK ARCHIVE SYSTEM =====
        function getWeekKey(weekStart) {
            return `${weekStart.getFullYear()}-W${getWeekNumber(weekStart)}`;
        }
        
        function archiveWeekByOffset(offset) {
            const weekStart = getWeekStartDate(offset);
            const weekEnd = getWeekEndDate(weekStart);
            const weekKey = getWeekKey(weekStart);
            
            let weekData = {
                weekNumber: getWeekNumber(weekStart),
                year: weekStart.getFullYear(),
                startDate: getLocalISODate(weekStart),
                endDate: getLocalISODate(weekEnd),
                totalMinutes: 0,
                dailyBreakdown: {},
                tagBreakdown: {},
                sessions: []
            };
            
            archivedSessionsArray.forEach(session => {
                const sDate = new Date(session.date + 'T00:00:00');
                if (sDate >= weekStart && sDate <= weekEnd) {
                    const mins = parseInt(session.duration) || 0;
                    weekData.totalMinutes += mins;
                    weekData.sessions.push(session);
                    
                    if (!weekData.tagBreakdown[session.tag]) {
                        weekData.tagBreakdown[session.tag] = 0;
                    }
                    weekData.tagBreakdown[session.tag] += mins;
                    
                    if (!weekData.dailyBreakdown[session.date]) {
                        weekData.dailyBreakdown[session.date] = 0;
                    }
                    weekData.dailyBreakdown[session.date] += mins;
                }
            });
            
            archivedWeeks[weekKey] = weekData;
            dbSet('archivedWeeks', archivedWeeks);
            return weekData;
        }
        
        async function loadArchivedWeeks() {
            const saved = await dbGet('archivedWeeks');
            if (saved) archivedWeeks = saved;
        }
        
        function getArchivedWeekData(weekOffset) {
            const weekStart = getWeekStartDate(weekOffset);
            const weekKey = getWeekKey(weekStart);
            return archivedWeeks[weekKey] || null;
        }
        
        async function checkAndArchivePreviousWeek() {
            const now = new Date();
            const dayOfWeek = now.getDay();
            
            if (dayOfWeek === 6) { // Saturday = new week started
                const lastWeekStart = getWeekStartDate(-1);
                const lastWeekKey = getWeekKey(lastWeekStart);
                
                if (!archivedWeeks[lastWeekKey]) {
                    const archived = archiveWeekByOffset(-1);
                    if (archived && archived.totalMinutes > 0) {
                        showToast(
                            currentSystemLanguage === 'ar' ? 'تم أرشفة الأسبوع!' : 'Week Archived!',
                            `${currentSystemLanguage === 'ar' ? 'الأسبوع' : 'Week'} ${archived.weekNumber}: ${formatMinutesToHM(archived.totalMinutes)}`,
                            'success'
                        );
                    }
                }
            }
        }

        // ===== UPDATED: renderWeeklySegmentedChart =====
        function renderWeeklySegmentedChart() {
            const holder = document.getElementById('weekly-chart-holder');
            holder.innerHTML = '';

            // Days ordered Saturday to Friday (Arabic week)
            const weekdaysArabic = ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];
            const weekdaysEnglish = ["Sat", "Sun", "Mon", "Tue", "Wed", "Thu", "Fri"];

            const weekStart = getWeekStartDate(currentViewedWeekOffset);
            const weekEnd = getWeekEndDate(weekStart);
            const weekNum = getWeekNumber(weekStart);
            const year = weekStart.getFullYear();
            const isCurrentWeek = currentViewedWeekOffset === 0;
            const isPastWeek = currentViewedWeekOffset < 0;

            // ===== WEEK NAVIGATION HEADER =====
            const navHeader = document.createElement('div');
            navHeader.className = 'week-header-card';
            
            const prevBtn = document.createElement('button');
            prevBtn.className = 'week-nav-btn';
            prevBtn.innerHTML = currentSystemLanguage === 'ar' ? '▶' : '◀';
            prevBtn.onclick = () => navigateWeek(-1);
            prevBtn.title = currentSystemLanguage === 'ar' ? 'الأسبوع السابق' : 'Previous Week';

            const nextBtn = document.createElement('button');
            nextBtn.className = 'week-nav-btn';
            nextBtn.innerHTML = currentSystemLanguage === 'ar' ? '◀' : '▶';
            nextBtn.onclick = () => navigateWeek(1);
            nextBtn.title = currentSystemLanguage === 'ar' ? 'الأسبوع القادم' : 'Next Week';

            const weekInfo = document.createElement('div');
            weekInfo.className = 'week-info-center';
            
            const weekBadge = document.createElement('div');
            weekBadge.className = 'week-number-display';
            weekBadge.style.color = isCurrentWeek ? 'var(--accent-orange)' : 'var(--text-light)';
            weekBadge.innerHTML = `${currentSystemLanguage === 'ar' ? 'الأسبوع' : 'Week'} ${weekNum}, ${year}`;
            if (isCurrentWeek) {
                weekBadge.innerHTML += ` <span class="current-badge">${currentSystemLanguage === 'ar' ? 'الحالي' : 'CURRENT'}</span>`;
            } else if (isPastWeek) {
                const archivedData = getArchivedWeekData(currentViewedWeekOffset);
                if (archivedData && archivedData.totalMinutes > 0) {
                    weekBadge.innerHTML += ` <span class="week-archive-badge">✓ ${currentSystemLanguage === 'ar' ? 'مؤرشف' : 'Archived'}</span>`;
                }
            }

            const weekRange = document.createElement('div');
            weekRange.className = 'week-range-display';
            weekRange.innerText = formatWeekRange(weekStart);

            weekInfo.appendChild(weekBadge);
            weekInfo.appendChild(weekRange);

            const currentBtn = document.createElement('button');
            currentBtn.className = 'week-current-btn';
            currentBtn.innerHTML = '◎';
            currentBtn.onclick = goToCurrentWeek;
            currentBtn.title = currentSystemLanguage === 'ar' ? 'الأسبوع الحالي' : 'Current Week';

            // RTL layout: prev on right, next on left
            if (currentSystemLanguage === 'ar') {
                navHeader.appendChild(nextBtn);
                navHeader.appendChild(weekInfo);
                navHeader.appendChild(currentBtn);
                navHeader.appendChild(prevBtn);
            } else {
                navHeader.appendChild(prevBtn);
                navHeader.appendChild(weekInfo);
                navHeader.appendChild(currentBtn);
                navHeader.appendChild(nextBtn);
            }
            
            holder.appendChild(navHeader);

            // ===== BUILD WEEK DATA =====
            let weeklyDataArray = [];
            for (let i = 0; i < 7; i++) {
                const dayDate = new Date(weekStart);
                dayDate.setDate(dayDate.getDate() + i);
                weeklyDataArray.push({
                    index: i,
                    date: dayDate,
                    dateISO: getLocalISODate(dayDate),
                    dayEN: weekdaysEnglish[i],
                    dayAR: weekdaysArabic[i],
                    totalTime: 0,
                    segments: [],
                    isToday: getLocalISODate(dayDate) === getLocalISODate(new Date())
                });
            }

            // Filter sessions for the viewed week (Saturday to Friday)
            archivedSessionsArray.forEach(session => {
                const sDate = new Date(session.date + 'T00:00:00');
                if (sDate >= weekStart && sDate <= weekEnd) {
                    const dayIndex = Math.floor((sDate - weekStart) / 86400000);
                    if (dayIndex >= 0 && dayIndex < 7) {
                        const minsVal = parseInt(session.duration) || 0;
                        const dayObj = weeklyDataArray[dayIndex];
                        dayObj.totalTime += minsVal;
                        let seg = dayObj.segments.find(s => s.tag === session.tag);
                        if (seg) seg.time += minsVal;
                        else dayObj.segments.push({ tag: session.tag, time: minsVal });
                    }
                }
            });

            // ===== WEEK SUMMARY =====
            const totalWeekMinutes = weeklyDataArray.reduce((sum, d) => sum + d.totalTime, 0);
            const activeDays = weeklyDataArray.filter(d => d.totalTime > 0).length;
            
            const weekSummary = document.createElement('div');
            weekSummary.style.cssText = 'display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;';
            weekSummary.innerHTML = `
                <div style="background:rgba(255,115,0,0.1);border:1px solid rgba(255,115,0,0.2);border-radius:12px;padding:10px 18px;">
                    <div style="font-size:11px;color:var(--text-gray);font-weight:600;">${currentSystemLanguage === 'ar' ? 'إجمالي الأسبوع' : 'Week Total'}</div>
                    <div style="font-size:20px;font-weight:800;color:var(--accent-orange);">${formatMinutesToHM(totalWeekMinutes)}</div>
                </div>
                <div style="background:rgba(130,0,255,0.1);border:1px solid rgba(130,0,255,0.2);border-radius:12px;padding:10px 18px;">
                    <div style="font-size:11px;color:var(--text-gray);font-weight:600;">${currentSystemLanguage === 'ar' ? 'الأيام النشطة' : 'Active Days'}</div>
                    <div style="font-size:20px;font-weight:800;color:var(--accent-purple);">${activeDays}/7</div>
                </div>
                ${isPastWeek ? `
                <div style="background:rgba(0,210,106,0.1);border:1px solid rgba(0,210,106,0.2);border-radius:12px;padding:10px 18px;">
                    <div style="font-size:11px;color:var(--text-gray);font-weight:600;">${currentSystemLanguage === 'ar' ? 'حالة الأرشفة' : 'Archive Status'}</div>
                    <div style="font-size:14px;font-weight:700;color:var(--success);">
                        ${archivedWeeks[getWeekKey(weekStart)] ? (currentSystemLanguage === 'ar' ? '✓ مؤرشف' : '✓ Archived') : (currentSystemLanguage === 'ar' ? 'غير مؤرشف' : 'Not Archived')}
                    </div>
                </div>
                ` : ''}
            `;
            holder.appendChild(weekSummary);

            // ===== RENDER EACH DAY =====
            weeklyDataArray.forEach(day => {
                const dayRow = document.createElement('div');
                dayRow.className = 'weekly-day-row';
                dayRow.style.cssText = 'display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.03);';

                const labelCol = document.createElement('div');
                labelCol.style.cssText = 'width:70px;flex-shrink:0;';
                
                const dayLabel = document.createElement('div');
                dayLabel.style.cssText = 'font-size:13px;font-weight:700;color:' + (day.isToday ? 'var(--accent-orange)' : 'var(--text-light)') + ';';
                dayLabel.innerText = currentSystemLanguage === 'ar' ? day.dayAR : day.dayEN;
                
                const dateLabel = document.createElement('div');
                dateLabel.style.cssText = 'font-size:10px;color:var(--text-gray);margin-top:2px;';
                dateLabel.innerText = day.date.toLocaleDateString(currentSystemLanguage === 'ar' ? 'ar-EG' : 'en-US', { month: 'numeric', day: 'numeric' });
                
                labelCol.appendChild(dayLabel);
                labelCol.appendChild(dateLabel);

                const contentCol = document.createElement('div');
                contentCol.style.cssText = 'flex:1;min-width:0;';

                if (day.totalTime === 0) {
                    const noData = document.createElement('div');
                    noData.style.cssText = 'color:var(--text-gray);font-size:12px;font-style:italic;padding:8px 0;';
                    noData.innerText = currentSystemLanguage === 'ar' ? 'لا توجد جلسات' : 'No sessions';
                    contentCol.appendChild(noData);
                } else {
                    const barTrack = document.createElement('div');
                    barTrack.className = 'weekly-stacked-track';
                    barTrack.style.cssText = 'height:28px;border-radius:14px;overflow:hidden;display:flex;width:100%;background:rgba(255,255,255,0.03);';

                    day.segments.forEach(segment => {
                        const segmentPercent = day.totalTime > 0 ? (segment.time / day.totalTime) * 100 : 0;
                        const segBlock = document.createElement('div');
                        segBlock.style.cssText = `height:100%;transition:width 0.5s ease;position:relative;background-color:${getTagColor(segment.tag)};width:${segmentPercent}%;`;
                        segBlock.setAttribute('data-tooltip', `${segment.tag}: ${segment.time} Min (${Math.round(segmentPercent)}%)`);

                        if (segmentPercent > 15) {
                            const pctLabel = document.createElement('span');
                            pctLabel.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.5);';
                            pctLabel.innerText = Math.round(segmentPercent) + '%';
                            segBlock.appendChild(pctLabel);
                        }
                        barTrack.appendChild(segBlock);
                    });
                    contentCol.appendChild(barTrack);

                    const tagsLegend = document.createElement('div');
                    tagsLegend.style.cssText = 'display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;';
                    day.segments.forEach(segment => {
                        const segmentPercent = day.totalTime > 0 ? (segment.time / day.totalTime) * 100 : 0;
                        const tagItem = document.createElement('div');
                        tagItem.style.cssText = 'display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-gray);';
                        tagItem.innerHTML = `
                            <span style="width:8px;height:8px;border-radius:50%;background-color:${getTagColor(segment.tag)};display:inline-block;"></span>
                            <span style="font-weight:600;color:var(--text-light);">${segment.tag}</span>
                            <span>${formatMinutesToHM(segment.time)}</span>
                            <span style="color:var(--accent-orange);font-weight:700;">(${Math.round(segmentPercent)}%)</span>
                        `;
                        tagsLegend.appendChild(tagItem);
                    });
                    contentCol.appendChild(tagsLegend);

                    const dayTotal = document.createElement('div');
                    dayTotal.style.cssText = 'font-size:11px;color:var(--text-gray);margin-top:6px;font-weight:600;';
                    dayTotal.innerText = `${currentSystemLanguage === 'ar' ? 'الإجمالي' : 'Total'}: ${formatMinutesToHM(day.totalTime)}`;
                    contentCol.appendChild(dayTotal);
                }

                dayRow.appendChild(labelCol);
                dayRow.appendChild(contentCol);
                holder.appendChild(dayRow);
            });

            // ===== WEEKLY TAG DISTRIBUTION =====
            if (totalWeekMinutes > 0) {
                const weekDistHeader = document.createElement('div');
                weekDistHeader.style.cssText = 'font-size:13px;font-weight:700;color:var(--text-light);margin-top:24px;margin-bottom:12px;padding-top:16px;border-top:1px solid var(--border-soft);';
                weekDistHeader.innerText = currentSystemLanguage === 'ar' ? 'توزيع المواد هذا الأسبوع' : 'Weekly Tag Distribution';
                holder.appendChild(weekDistHeader);

                const weekTagMap = {};
                weeklyDataArray.forEach(day => {
                    day.segments.forEach(seg => {
                        if (weekTagMap[seg.tag]) weekTagMap[seg.tag] += seg.time;
                        else weekTagMap[seg.tag] = seg.time;
                    });
                });

                const distGrid = document.createElement('div');
                distGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;';
                Object.entries(weekTagMap).forEach(([tag, minutes]) => {
                    const pct = Math.round((minutes / totalWeekMinutes) * 100);
                    const distItem = document.createElement('div');
                    distItem.style.cssText = 'background:rgba(255,255,255,0.03);border:1px solid var(--border-soft);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;';
                    distItem.innerHTML = `
                        <div style="width:36px;height:36px;border-radius:10px;background:${getTagColor(tag)};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;">${pct}%</div>
                        <div style="flex:1;min-width:0;">
                            <div style="font-size:13px;font-weight:700;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${tag}</div>
                            <div style="font-size:11px;color:var(--text-gray);">${formatMinutesToHM(minutes)}</div>
                        </div>
                    `;
                    distGrid.appendChild(distItem);
                });
                holder.appendChild(distGrid);
            }
        }

        // [All other original functions remain the same]

        // ===== UPDATED: bootApp =====
        async function bootApp() {
            if (appHasBooted) return;
            appHasBooted = true;
            await initDatabaseAndLoad();
            await loadArchivedWeeks();
            await checkAndArchivePreviousWeek();
            renderTagsChips();
            refreshTimerDisplay();
            recalculateAndRenderDashboard();
            renderHistoryGridWithPagination();
            renderGoalsScreen();
            renderHabitsScreen();
            syncLanguageInterfaceStrings();
            updateQuickStats();
            renderHeatmap();
            renderWeeklySegmentedChart();
        }
    </script>
</body>
</html>
